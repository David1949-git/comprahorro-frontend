<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard - ComprAhorro</title>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png"/>
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png"/>
  <link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
  <meta name="theme-color" content="#0a192f"/>
  <script defer src="/pwa-init.js"></script>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    .hero { text-align: center; padding: 52px 20px 40px; }

    .tagline { font-size: 19px; font-weight: 700; color: var(--blue-dark); margin: 0 0 8px; }
    .logout-btn { background: none; border: 1.5px solid var(--blue-border); color: var(--blue-mid); padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: Poppins,sans-serif; transition: all 0.2s; }
    .logout-btn:hover { border-color: #E53E3E; color: #E53E3E; }
    .back-results-btn { display: inline-block; background: none; border: 1.5px solid #1e3a8a; color: #1e3a8a; padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: Poppins,sans-serif; transition: all 0.2s; }
    .back-results-btn:hover { background: #1e3a8a; color: #fff; }
  </style>
</head>
<body>
<div class="page-wrapper">
  <nav class="navbar">
    <a href="dashboard.html" class="nav-brand">
      <img src="cerdo-logo.jpg" alt="ComprAhorro" class="nav-logo"/>
      <span class="nav-name">Compr<span>Ahorro</span></span>
    </a>
    <div class="nav-links">
      <span style="font-size:13px;font-weight:600;color:var(--blue-dark);" id="user-name">🐷</span>
      <button class="logout-btn" onclick="doLogout()">Salir</button>
    </div>
  </nav>
  <main class="main-content">
    <section class="hero">
      <div class="logo-aura fade-in">
        <img src="cerdo-logo.jpg" alt="ComprAhorro"/>
      </div>
      
      <h1 class="nav-name fade-in-2" style="font-size:34px;margin-bottom:8px;">Compr<span>Ahorro</span></h1>
      
      <p class="tagline fade-in-3">¡Nosotros buscamos, tú ahorras!</p>
      <div class="steps fade-in-3">
        <div class="step"><div class="step-num">COMPARA</div><div class="step-sub">Precios reales</div></div>
        <div class="step"><div class="step-num">ELIGE</div><div class="step-sub">Sin presiones</div></div>
        <div class="step"><div class="step-num">COMPRA</div><div class="step-sub">Directo sin intermediarios</div></div>
      </div>
      <div id="back-results-container" style="display:none;text-align:center;margin:20px auto;">
        <button class="back-results-btn" id="back-results-btn">← Volver a resultados</button>
      </div>
      <div class="search-bar fade-in-4" style="max-width:480px;margin:0 auto;">
        <input type="text" id="search-input" placeholder="Que quieres ahorrar hoy?" onkeydown="handleSearch(event)"/>
        <button onclick="goSearch()">BUSCAR</button>
      </div>
    </section>
  </main>
  <footer class="footer">ComprAhorro · Compara, elige y ahorra 🐷<br><small style="opacity:0.7;font-size:11px;">🔒 Marca en proceso de registro · App en fase de pruebas</small></footer>
</div>
<script>
  const token = localStorage.getItem("comprAhorro_token");
  if (!token) window.location.href = "login.html";
  function parseJWT(t) { try { return JSON.parse(atob(t.split(".")[1])); } catch(e) { return {}; } }
  const payload = parseJWT(token);
  const userName = (payload.name || payload.email || "usuario").split(" ")[0];
  document.getElementById("user-name").textContent = "🐷 " + userName;
  const params = new URLSearchParams(window.location.search);
  const q = params.get("q") || "";
  
  // Si hay término de búsqueda, ejecutar búsqueda automáticamente
  if (q) {
    // Limpiar el término guardado después de usarlo
    localStorage.removeItem('terminoBusqueda');
    localStorage.removeItem('registroExitoso');
    window.location.href = "results.html?q=" + encodeURIComponent(q);
  }
  const ultimaBusqueda = localStorage.getItem('comprAhorro_ultima_busqueda');
  if (ultimaBusqueda) {
    document.getElementById('back-results-container').style.display = 'block';
    document.getElementById('back-results-btn').textContent = '← Volver a resultados de "' + ultimaBusqueda + '"';
    document.getElementById('back-results-btn').onclick = function() {
      window.location.href = "results.html?q=" + encodeURIComponent(ultimaBusqueda);
    };
  }
  function handleSearch(e) { if (e.key === "Enter") goSearch(); }
  function goSearch() {
    const q = document.getElementById("search-input").value.trim();
    if (!q) return;
    window.location.href = "results.html?q=" + encodeURIComponent(q);
  }
  function doLogout() {
    localStorage.removeItem("comprAhorro_token");
    localStorage.removeItem("comprAhorro_ultima_busqueda");
    window.location.href = "index.html";
  }
</script>
</body>
</html>
