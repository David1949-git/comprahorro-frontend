<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard - ComprAhorro</title>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    .hero { text-align: center; padding: 52px 20px 40px; }
    .tagline { font-size: 19px; font-weight: 700; color: var(--blue-dark); margin: 0 0 8px; }
    .features { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; max-width: 680px; margin: 40px auto 0; padding: 0 20px; }
    .feat-card { background: var(--white); border-radius: var(--radius-lg); border: 1px solid var(--blue-border); padding: 20px; text-align: center; transition: transform 0.2s, box-shadow 0.2s; }
    .feat-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
    .feat-icon { font-size: 28px; margin-bottom: 8px; }
    .feat-title { font-size: 13px; font-weight: 700; color: var(--blue-dark); margin-bottom: 4px; }
    .feat-desc { font-size: 12px; color: var(--gray-text); }
    .logout-btn { background: none; border: 1.5px solid var(--blue-border); color: var(--blue-mid); padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Poppins', sans-serif; transition: all 0.2s; }
    .logout-btn:hover { border-color: #E53E3E; color: #E53E3E; }
  </style>
</head>
<body>
<div class="page-wrapper">
  <nav class="navbar">
    <a href="dashboard.html" class="nav-brand">
      <img src="logo.jpeg" alt="ComprAhorro" class="nav-logo"/>
      <span class="nav-name">Compr<span>Ahorro</span></span>
    </a>
    <div class="nav-links">
      <span style="font-size:13px;font-weight:600;color:var(--blue-dark);" id="user-name">🐷</span>
      <button class="logout-btn" onclick="doLogout()">Salir</button>
    </div>
  </nav>
  <main class="main-content">
    <section class="hero">
      <div class="logo-aura fade-in">
        <img src="logo.jpeg" alt="ComprAhorro"/>
      </div>
      <h1 class="nav-name fade-in-2" style="font-size:34px;margin-bottom:8px;">Compr<span>Ahorro</span></h1>
      <div class="badge fade-in-2" style="margin-bottom:14px;">Todo en un solo lugar</div>
      <p class="tagline fade-in-3">Nosotros buscamos, tu ahorras!</p>
      <div class="steps fade-in-3">
        <div class="step"><div class="step-num">1. COMPARA</div><div class="step-sub">Precios reales</div></div>
        <div class="step"><div class="step-num">2. ELIGE</div><div class="step-sub">Sin presiones</div></div>
        <div class="step"><div class="step-num">3. COMPRA</div><div class="step-sub">Directo al grano</div></div>
      </div>
      <div class="search-bar fade-in-4" style="max-width:480px;margin:0 auto;">
        <input type="text" id="search-input" placeholder="Que quieres ahorrar hoy?" onkeydown="handleSearch(event)"/>
        <button onclick="goSearch()">BUSCAR</button>
      </div>
    </section>
  </main>
  <footer class="footer">ComprAhorro · Compara, elige y ahorra 🐷</footer>
</div>
<script>
  const token = localStorage.getItem('comprAhorro_token');
  if (!token) window.location.href = 'login.html';
  function parseJWT(t) { try { return JSON.parse(atob(t.split('.')[1])); } catch(e) { return {}; } }
  const payload = parseJWT(token);
  const userName = (payload.name || payload.email || 'usuario').split(' ')[0];
  document.getElementById('user-name').textContent = '🐷 ' + userName;
  const params = new URLSearchParams(window.location.search);
  const q = params.get('q') || '';
  if (q) window.location.href = 'results.html?q=' + encodeURIComponent(q);
  function handleSearch(e) { if (e.key === 'Enter') goSearch(); }
  function goSearch() {
    const q = document.getElementById('search-input').value.trim();
    if (!q) return;
    window.location.href = 'results.html?q=' + encodeURIComponent(q);
  }
  function doLogout() {
    localStorage.removeItem('comprAhorro_token');
    window.location.href = 'index.html';
  }
</script>
</body>
</html>
