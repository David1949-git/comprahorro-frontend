<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iniciar sesion - ComprAhorro</title>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png"/>
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png"/>
  <link rel="apple-touch-icon" href="/apple-touch-icon.png"/>
  <meta name="theme-color" content="#0a192f"/>
  <script defer src="/pwa-init.js"></script>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    body { background: var(--gray-bg); display: flex; flex-direction: column; min-height: 100vh; }
    .auth-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 16px; }
    .auth-card { width: 100%; max-width: 420px; }
    .auth-header { text-align: center; margin-bottom: 28px; }
    .auth-logo { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2.5px solid var(--blue-border); box-shadow: 0 0 0 5px var(--blue-light); margin-bottom: 14px; }
    .auth-title { font-size: 22px; font-weight: 800; color: var(--blue-dark); margin-bottom: 4px; }
    .auth-title span { color: var(--blue-main); }
    .auth-sub { font-size: 13px; color: var(--gray-text); }
    .divider { text-align: center; margin: 20px 0; font-size: 12px; color: var(--gray-hint); position: relative; }
    .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 42%; height: 1px; background: var(--blue-border); }
    .divider::before { left: 0; } .divider::after { right: 0; }
    .auth-footer { text-align: center; margin-top: 20px; font-size: 13px; color: var(--gray-text); }
    .auth-footer a { color: var(--blue-main); font-weight: 600; text-decoration: none; }
    .pass-wrap { position: relative; }
    .pass-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 16px; color: var(--gray-hint); }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="nav-brand">
      <img src="logo.jpeg" alt="ComprAhorro" class="nav-logo"/>
      <span class="nav-name">Compr<span>Ahorro</span></span>
    </a>
    <div class="nav-links">
      <a href="index.html">Inicio</a>
      <a href="register.html" class="nav-btn outline">Registrarse</a>
    </div>
  </nav>
  <div class="auth-wrap">
    <div class="auth-card fade-in">
      <div class="auth-header">
        <img src="logo.jpeg" alt="ComprAhorro" class="auth-logo"/>
        <h1 class="auth-title">Compr<span>Ahorro</span></h1>
        <p class="auth-sub">Ingresa a tu cuenta para comparar precios</p>
      </div>
      <div class="card">
        <div class="alert alert-error" id="error-msg"></div>
        <div class="alert alert-success" id="success-msg"></div>
        <div class="form-group">
          <label class="form-label" for="email">Correo electronico</label>
          <input class="form-input" type="email" id="email" placeholder="tu@correo.com"/>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Contrasena</label>
          <div class="pass-wrap">
            <input class="form-input" type="password" id="password" placeholder="Tu contrasena" onkeydown="if(event.key==='Enter')doLogin()"/>
            <button class="pass-toggle" onclick="togglePass()" type="button">👁</button>
          </div>
        </div>
        <button class="btn btn-primary" onclick="doLogin()" id="login-btn">Iniciar sesion</button>
        <div class="divider">o</div>
        <a href="register.html" class="btn btn-outline" style="width:100%;text-align:center;">Crear cuenta nueva</a>
      </div>
      <div class="auth-footer">No tienes cuenta? <a href="register.html">Registrate gratis</a></div>
    </div>
  </div>
  <footer class="footer">ComprAhorro 2026</footer>
<script>
  function togglePass() {
    const i = document.getElementById('password');
    i.type = i.type === 'password' ? 'text' : 'password';
  }
  function showError(msg) {
    const e = document.getElementById('error-msg');
    e.textContent = msg; e.classList.add('show');
    document.getElementById('success-msg').classList.remove('show');
  }
  function showSuccess(msg) {
    const e = document.getElementById('success-msg');
    e.textContent = msg; e.classList.add('show');
    document.getElementById('error-msg').classList.remove('show');
  }
  async function doLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('login-btn');
    if (!email || !password) { showError('Por favor completa todos los campos.'); return; }
    btn.textContent = 'Verificando...'; btn.disabled = true;
    try {
      const res = await fetch('https://comprahorro-backend-1.onrender.com/api/auth/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (res.ok && data.token) {
        localStorage.setItem('comprAhorro_token', data.token);
        showSuccess('Bienvenido! Redirigiendo...');
        
        // Obtener término de búsqueda guardado
        const terminoBusqueda = localStorage.getItem('terminoBusqueda');
        const registroExitoso = localStorage.getItem('registroExitoso');
        
        setTimeout(() => { 
          if (terminoBusqueda) {
            // Si hay un término de búsqueda, ir al dashboard con la búsqueda
            window.location.href = 'dashboard.html?q=' + encodeURIComponent(terminoBusqueda);
          } else {
            // Si no, ir al dashboard normal
            window.location.href = 'dashboard.html';
          }
        }, 800);
      } else {
        showError(data.message || 'Credenciales incorrectas.');
        btn.textContent = 'Iniciar sesion'; btn.disabled = false;
      }
    } catch(e) {
      showError('Error de conexion. Verifica tu internet.');
      btn.textContent = 'Iniciar sesion'; btn.disabled = false;
    }
  }
  if (localStorage.getItem('comprAhorro_token')) window.location.href = 'dashboard.html';
</script>
</body>
</html>
